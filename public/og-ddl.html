<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dropdown Logistics — OG Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }
  body {
    background: #0D1B2A;
    color: #F5F1EB;
    font-family: 'Source Serif 4', Georgia, serif;
    position: relative;
  }

  /* Crimson grid — same system as ddl-landing */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(178,53,49,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(178,53,49,0.035) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
  }

  /* Radial glow behind the stamp */
  .glow {
    position: absolute;
    width: 900px;
    height: 900px;
    left: -120px;
    top: -160px;
    background: radial-gradient(circle, rgba(178,53,49,0.10) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Corner tick marks — flagship detail */
  .ticks {
    position: absolute;
    inset: 28px;
    pointer-events: none;
  }
  .ticks::before,
  .ticks::after,
  .tick-b::before,
  .tick-b::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 22px;
    border: 1.5px solid rgba(178,53,49,0.55);
  }
  .ticks::before { top: 0; left: 0; border-right: none; border-bottom: none; }
  .ticks::after  { top: 0; right: 0; border-left: none; border-bottom: none; }
  .tick-b::before { bottom: 0; left: 0; border-right: none; border-top: none; }
  .tick-b::after  { bottom: 0; right: 0; border-left: none; border-top: none; }

  /* Main composition */
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 80px;
    gap: 68px;
  }

  /* STAMP */
  .stamp {
    flex-shrink: 0;
    width: 340px;
    height: 340px;
    filter: drop-shadow(0 0 28px rgba(178,53,49,0.45));
  }

  /* TEXT BLOCK */
  .text {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: rgba(178,53,49,0.9);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 104px;
    line-height: 0.96;
    letter-spacing: -0.035em;
    color: #F5F1EB;
    margin-bottom: 26px;
  }
  .title span { color: #B23531; }
  .rule {
    width: 88px;
    height: 2px;
    background: #B23531;
    margin-bottom: 22px;
    opacity: 0.8;
  }
  .tagline {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.35;
    color: rgba(245,241,235,0.78);
    letter-spacing: 0.002em;
  }

  /* BOTTOM STRIP */
  .bottom {
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .bottom .flow {
    color: #6B7B8D;
  }
  .bottom .flow em {
    font-style: normal;
    color: rgba(245,241,235,0.75);
  }
  .bottom .mark {
    color: rgba(178,53,49,0.85);
  }
</style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="ticks"><div class="tick-b"></div></div>

  <div class="stage">

    <!-- STAMP: crimson ring, dashed inner ring, cream DD monogram -->
    <svg class="stamp" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="ddl-og-top"    d="M 20,70 A 50,50 0 0,1 120,70"/>
        <path id="ddl-og-bottom" d="M 20,70 A 50,50 0 0,0 120,70"/>
      </defs>

      <!-- Outer crimson ring -->
      <circle cx="70" cy="70" r="66" fill="none" stroke="#B23531" stroke-width="2.5"/>
      <!-- Dashed inner ring -->
      <circle cx="70" cy="70" r="56" fill="none" stroke="#B23531" stroke-width="0.9" stroke-dasharray="3 4"/>
      <!-- Filled disc (navy) -->
      <circle cx="70" cy="70" r="62" fill="#0D1B2A"/>

      <!-- DD monogram — cream -->
      <text x="70" y="82"
            text-anchor="middle"
            font-family="Space Grotesk, sans-serif"
            font-weight="700"
            font-size="40"
            fill="#F5F1EB"
            letter-spacing="-3">DD</text>

      <!-- Curved wordmark -->
      <text font-family="JetBrains Mono, monospace" font-size="6.5" fill="#F5F1EB" letter-spacing="3">
        <textPath href="#ddl-og-top" startOffset="50%" text-anchor="middle">DROPDOWN</textPath>
      </text>
      <text font-family="JetBrains Mono, monospace" font-size="6.5" fill="#6B7B8D" letter-spacing="3">
        <textPath href="#ddl-og-bottom" startOffset="50%" text-anchor="middle">LOGISTICS</textPath>
      </text>

      <!-- Register marks -->
      <line x1="70" y1="4" x2="70" y2="11" stroke="#B23531" stroke-width="1.5"/>
      <line x1="70" y1="129" x2="70" y2="136" stroke="#B23531" stroke-width="1.5"/>
      <line x1="4" y1="70" x2="11" y2="70" stroke="#B23531" stroke-width="1.5"/>
      <line x1="129" y1="70" x2="136" y2="70" stroke="#B23531" stroke-width="1.5"/>
      <circle cx="8" cy="70" r="2.5" fill="#C49A3C"/>
      <circle cx="132" cy="70" r="2.5" fill="#C49A3C"/>
    </svg>

    <div class="text">
      <div class="eyebrow">One Operator · Eight Products · CPA</div>
      <h1 class="title">Dropdown <span>Logistics</span></h1>
      <div class="rule"></div>
      <div class="tagline">Humble surface. Cathedral underneath.</div>
    </div>

  </div>

  <div class="bottom">
    <div class="flow">Chaos &rarr; <em>Structured</em> &rarr; <em>Automated</em></div>
    <div class="mark">CottageHumble</div>
  </div>

</body>
</html>

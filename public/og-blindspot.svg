    <rect x="700" y="390" width="440" height="120" rx="6" fill="#10202f" stroke="rgba(107,157,194,0.3)"/>
    <text x="724" y="426" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="rgba(107,157,194,0.7)" letter-spacing="3">PATTERNS DETECTED</text>
    <text x="724" y="488" font-family="JetBrains Mono, monospace" font-size="56" font-weight="800" fill="#6B9DC2">12</text>
  </g>

  <text x="700" y="565" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">BLINDSPOT · DROPDOWNLOGISTICS.COM/BLINDSPOT</text>
</svg>

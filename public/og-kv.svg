<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Knowledge Vault — Dropdown Logistics</title>
  <desc>Knowledge Vault open graph card — DDL institutional memory</desc>

  <rect width="1200" height="630" fill="#0D1B2A"/>
  <rect x="0" y="0" width="4" height="630" fill="#2C7A7B"/>

  <g stroke="rgba(245,241,235,0.04)" stroke-width="1">
    <line x1="0" y1="210" x2="600" y2="210"/>
    <line x1="0" y1="420" x2="600" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
  </g>

  <!-- LEFT -->
  <text x="60" y="88" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#2C7A7B" letter-spacing="4">DROPDOWN LOGISTICS</text>

  <text x="56" y="200" font-family="Space Grotesk, sans-serif" font-size="76" font-weight="800" fill="#F5F1EB" letter-spacing="-2">Knowledge</text>
  <text x="56" y="280" font-family="Space Grotesk, sans-serif" font-size="76" font-weight="800" fill="#2C7A7B" letter-spacing="-2">Vault</text>

  <text x="60" y="338" font-family="Source Serif 4, serif" font-size="20" font-weight="300" fill="rgba(245,241,235,0.55)" font-style="italic">The corpus remembers everything.</text>

  <line x1="60" y1="370" x2="560" y2="370" stroke="rgba(245,241,235,0.1)" stroke-width="1"/>

  <g font-family="JetBrains Mono, monospace">
    <text x="60" y="420" font-size="32" font-weight="700" fill="#2C7A7B">540K+</text>
    <text x="60" y="442" font-size="10" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">CHUNKS</text>

    <text x="220" y="420" font-size="32" font-weight="700" fill="#C49A3C">9</text>
    <text x="220" y="442" font-size="10" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">COLLECTIONS</text>

    <text x="380" y="420" font-size="32" font-weight="700" fill="#6B9DC2">1010</text>
    <text x="380" y="442" font-size="10" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">SEAT</text>
  </g>

  <line x1="60" y1="470" x2="560" y2="470" stroke="rgba(245,241,235,0.06)" stroke-width="1"/>

  <text x="60" y="513" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="rgba(245,241,235,0.3)" letter-spacing="2">Chaos → Structured → Automated</text>

  <!-- RIGHT — node graph -->
  <g>
    <!-- edges first -->
    <g stroke="rgba(44,122,123,0.4)" stroke-width="1.5">
      <line x1="900" y1="315" x2="780" y2="200"/>
      <line x1="900" y1="315" x2="1020" y2="200"/>
      <line x1="900" y1="315" x2="700" y2="315"/>
      <line x1="900" y1="315" x2="1100" y2="315"/>
      <line x1="900" y1="315" x2="780" y2="430"/>
      <line x1="900" y1="315" x2="1020" y2="430"/>
      <line x1="780" y1="200" x2="1020" y2="200"/>
      <line x1="780" y1="430" x2="1020" y2="430"/>
      <line x1="700" y1="315" x2="780" y2="200"/>
      <line x1="1100" y1="315" x2="1020" y2="430"/>
    </g>

    <!-- center hub -->
    <circle cx="900" cy="315" r="36" fill="rgba(44,122,123,0.18)" stroke="#2C7A7B" stroke-width="2"/>
    <text x="900" y="320" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#F5F1EB" text-anchor="middle">CORPUS</text>

    <!-- outer nodes -->
    <g>
      <circle cx="780" cy="200" r="22" fill="rgba(196,154,60,0.15)" stroke="#C49A3C" stroke-width="1.5"/>
      <text x="780" y="204" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#C49A3C" text-anchor="middle">CR</text>

      <circle cx="1020" cy="200" r="22" fill="rgba(74,158,107,0.15)" stroke="#4A9E6B" stroke-width="1.5"/>
      <text x="1020" y="204" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#4A9E6B" text-anchor="middle">STD</text>

      <circle cx="700" cy="315" r="22" fill="rgba(107,157,194,0.15)" stroke="#6B9DC2" stroke-width="1.5"/>
      <text x="700" y="319" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#6B9DC2" text-anchor="middle">DOC</text>

      <circle cx="1100" cy="315" r="22" fill="rgba(178,53,49,0.15)" stroke="#B23531" stroke-width="1.5"/>
      <text x="1100" y="319" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#B23531" text-anchor="middle">SES</text>

      <circle cx="780" cy="430" r="22" fill="rgba(138,108,201,0.15)" stroke="#8a6cc9" stroke-width="1.5"/>
      <text x="780" y="434" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#8a6cc9" text-anchor="middle">DEX</text>

      <circle cx="1020" cy="430" r="22" fill="rgba(196,154,60,0.15)" stroke="#C49A3C" stroke-width="1.5"/>
      <text x="1020" y="434" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700" fill="#C49A3C" text-anchor="middle">CMD</text>
    </g>
  </g>

  <text x="700" y="565" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">KNOWLEDGE VAULT · DROPDOWNLOGISTICS.COM/KNOWLEDGE-VAULT</text>
</svg>

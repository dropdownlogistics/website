<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CanonPress — Dropdown Logistics</title>
  <desc>CanonPress open graph card — four series, ten council seats, one author</desc>

  <rect width="1200" height="630" fill="#0D1B2A"/>
  <rect x="0" y="0" width="4" height="630" fill="#B23531"/>

  <g stroke="rgba(245,241,235,0.04)" stroke-width="1">
    <line x1="0" y1="210" x2="600" y2="210"/>
    <line x1="0" y1="420" x2="600" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
  </g>

  <!-- LEFT — BRAND -->
  <text x="60" y="88" font-family="JetBrains Mono, monospace" font-size="11" font-weight="700" fill="#B23531" letter-spacing="4">DROPDOWN LOGISTICS</text>

  <text x="56" y="200" font-family="Space Grotesk, sans-serif" font-size="92" font-weight="800" fill="#F5F1EB" letter-spacing="-2">Canon</text>
  <text x="56" y="290" font-family="Space Grotesk, sans-serif" font-size="92" font-weight="800" fill="#B23531" letter-spacing="-2">Press</text>

  <text x="60" y="348" font-family="Source Serif 4, serif" font-size="20" font-weight="300" fill="rgba(245,241,235,0.55)" font-style="italic">Governed knowledge. Built in the open.</text>

  <line x1="60" y1="380" x2="560" y2="380" stroke="rgba(245,241,235,0.1)" stroke-width="1"/>

  <g font-family="JetBrains Mono, monospace">
    <text x="60" y="430" font-size="32" font-weight="700" fill="#B23531">4</text>
    <text x="60" y="452" font-size="10" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">SERIES</text>

    <text x="200" y="430" font-size="32" font-weight="700" fill="#C49A3C">10</text>
    <text x="200" y="452" font-size="10" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">COUNCIL SEATS</text>

    <text x="360" y="430" font-size="32" font-weight="700" fill="#6B9DC2">1</text>
    <text x="360" y="452" font-size="10" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">AUTHOR</text>
  </g>

  <line x1="60" y1="478" x2="560" y2="478" stroke="rgba(245,241,235,0.06)" stroke-width="1"/>

  <text x="60" y="520" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="rgba(245,241,235,0.3)" letter-spacing="2">Chaos &#8594; Structured &#8594; Automated</text>

  <!-- RIGHT — Four series bars -->
  <g>
    <text x="700" y="156" font-family="JetBrains Mono, monospace" font-size="10" font-weight="700" fill="rgba(178,53,49,0.7)" letter-spacing="3">FOUR SERIES</text>

    <!-- CT Converge -->
    <rect x="700" y="180" width="440" height="62" rx="6" fill="#10202f" stroke="rgba(178,53,49,0.35)"/>
    <rect x="700" y="180" width="4" height="62" fill="#B23531"/>
    <text x="724" y="208" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#B23531" letter-spacing="2">CT</text>
    <text x="772" y="208" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#F5F1EB">Converge</text>
    <text x="772" y="230" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="rgba(245,241,235,0.45)" letter-spacing="2">WEEKLY</text>

    <!-- RL RedLine -->
    <rect x="700" y="252" width="440" height="62" rx="6" fill="#10202f" stroke="rgba(178,53,49,0.35)"/>
    <rect x="700" y="252" width="4" height="62" fill="#B23531"/>
    <text x="724" y="280" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#B23531" letter-spacing="2">RL</text>
    <text x="772" y="280" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#F5F1EB">RedLine</text>
    <text x="772" y="302" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="rgba(245,241,235,0.45)" letter-spacing="2">ON CONSTRAINT</text>

    <!-- DC DeepCut -->
    <rect x="700" y="324" width="440" height="62" rx="6" fill="#10202f" stroke="rgba(178,53,49,0.35)"/>
    <rect x="700" y="324" width="4" height="62" fill="#B23531"/>
    <text x="724" y="352" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#B23531" letter-spacing="2">DC</text>
    <text x="772" y="352" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#F5F1EB">DeepCut</text>
    <text x="772" y="374" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="rgba(245,241,235,0.45)" letter-spacing="2">ON DEPTH</text>

    <!-- GT GroundTruth -->
    <rect x="700" y="396" width="440" height="62" rx="6" fill="#10202f" stroke="rgba(178,53,49,0.35)"/>
    <rect x="700" y="396" width="4" height="62" fill="#B23531"/>
    <text x="724" y="424" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#B23531" letter-spacing="2">GT</text>
    <text x="772" y="424" font-family="Space Grotesk, sans-serif" font-size="22" font-weight="700" fill="#F5F1EB">GroundTruth</text>
    <text x="772" y="446" font-family="JetBrains Mono, monospace" font-size="9" font-weight="600" fill="rgba(245,241,235,0.45)" letter-spacing="2">ON OBSERVATION</text>
  </g>

  <text x="700" y="565" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="rgba(245,241,235,0.35)" letter-spacing="2">CANONPRESS &#183; DROPDOWNLOGISTICS.COM/CANONPRESS</text>
</svg>
